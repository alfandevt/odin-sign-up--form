<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Odin Sign Up Form</title>
  </head>
  <body>
    <main id="root">
      <div class="left">
        <img
          src="assets/backgrounds/jeremy-hynes-2VsPnDt2SQs-unsplash.jpg"
          alt="Photo by Jeremy Hynes on Unsplash"
          class="background"
        />
        <div class="logo">
          <p><img src="assets/logo/odin-lined.png" alt="Odin" />Odin</p>
        </div>
        <p class="credit">
          Photo by
          <a
            href="https://unsplash.com/@hynesight?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
            >Jeremy Hynes</a
          >
          on
          <a
            href="https://unsplash.com/photos/brown-and-white-owl-in-close-up-photography-2VsPnDt2SQs?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
            >Unsplash</a
          >
        </p>
      </div>
      <div class="right">
        <p>
          This is not a real online services! You know you need something like
          this in your life to help you realize your deepest dreams.
          <br />Sign up <em>now</em> to get started!
        </p>
        <p>You <em>know</em> You want to.</p>
        <div class="forms">
          <form action="POST" class="controls">
            <div class="card">
              <h2>Let's do this!</h2>
              <div class="grid-form">
                <div class="field-group">
                  <label for="first-name">First Name</label>
                  <input type="text" id="first-name" required />
                </div>
                <div class="field-group">
                  <label for="last-name">Last Name</label>
                  <input type="text" id="last-name" required />
                </div>
                <div class="field-group">
                  <label for="email">Email</label>
                  <input type="email" id="email" required />
                </div>
                <div class="field-group">
                  <label for="phone">Phone</label>
                  <input type="tel" id="phone" required />
                </div>
                <div class="field-group">
                  <label for="password">Password</label>
                  <input type="password" id="password" required minlength="8" />
                </div>
                <div class="field-group">
                  <label for="password-confirm">Confirm Password</label>
                  <input
                    type="password"
                    id="password-confirm"
                    required
                    minlength="8"
                  />
                </div>
              </div>
            </div>
            <div class="form-action">
              <button type="button">Create Account</button>
              <p>Already have an acount? <a href="#">Log In</a></p>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
